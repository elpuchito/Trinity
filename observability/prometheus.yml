# ============================================
# Prometheus Scrape Configuration
# ============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Trinity Backend — custom app metrics
  - job_name: "triageforge-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: "triageforge"

  # OTel Collector — internal collector metrics
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
